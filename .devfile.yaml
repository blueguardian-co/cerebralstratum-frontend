---
schemaVersion: 2.1.0
metadata:
  name: cerebral-stratum-frontend
components:
  - attributes:
      controller.devfile.io/merge-contribution: true
    container:
      endpoints:
        - exposure: public
          name: nodejs
          protocol: http
          targetPort: 3000
      env:
        - name: CHE_DASHBOARD_URL
          value: 'https://devspaces.apps.sandbox-m3.1530.p1.openshiftapps.com'
        - name: CHE_PLUGIN_REGISTRY_URL
          value: 'https://devspaces.apps.sandbox-m3.1530.p1.openshiftapps.com/plugin-registry/v3'
        - name: CHE_PLUGIN_REGISTRY_INTERNAL_URL
          value: 'http://plugin-registry.crw.svc:8080/v3'
        - name: OPENVSX_REGISTRY_URL
          value: 'https://open-vsx.org'
      image: 'registry.redhat.io/devspaces/udi-rhel8@sha256:99ff1b5c541855e4cf368816c4bcdcdc86d32304023f72c4443213a4032ef05b'
      memoryLimit: 1G
      mountSources: true
      sourceMapping: /projects
    name: tools
commands:
  - exec:
      commandLine: npm install
      component: tools
      group:
        kind: build
      label: Download dependencies
      workingDir: '${PROJECTS_ROOT}/cerebralstratum-frontend'
    id: 1-dependencies
  - exec:
      commandLine: npm run start:dev
      component: tools
      group:
        kind: run
      label: Run the web app
      workingDir: '${PROJECTS_ROOT}/cerebralstratum-frontend'
    id: 2-run
  - exec:
      commandLine: npm install; npm run start:dev
      component: tools
      group:
        kind: run
      label: Run the web app (and download dependencies)
      workingDir: '${PROJECTS_ROOT}/cerebralstratum-frontend'
    id: 3-install-and-run
  - exec:
      commandLine: nodemon --inspect app.js
      component: tools
      group:
        isDefault: true
        kind: debug
      label: Run the web app (debugging enabled)
      workingDir: '${PROJECTS_ROOT}/cerebralstratum-frontend'
    id: 4-debug
  - exec:
      commandLine: 'node_server_pids=$(pgrep -fx ''.*nodemon (--inspect )?app.js'' | tr "\\n" " ") && echo "Stopping node server with PIDs: ${node_server_pids}" &&  kill -15 ${node_server_pids} &>/dev/null && echo ''Done.'''
      component: tools
      group:
        kind: run
      label: Stop the web app
    id: 5-stopapp
