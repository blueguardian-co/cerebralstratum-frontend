<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueWard</title>
    <script src="/env.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        /* #root must have a definite width/height: Dashboard's children are all
           position:absolute (out of flow), so #root has no intrinsic content
           size for the flex algorithm to shrink-to-fit against, and collapses
           to zero width without this. */
        #root {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="root">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
            <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
            <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
                    stroke-dasharray="90 125">
                <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                                  repeatCount="indefinite"/>
            </circle>
        </svg>
    </div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
