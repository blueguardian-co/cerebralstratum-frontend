schemaVersion: 2.2.0
metadata:
  name: cs-frontend
attributes:
  controller.devfile.io/devworkspace-config:
    name: devworkspace-config
    namespace: openshift-operators
  controller.devfile.io/storage-type: per-user
projects:
  - name: cs-frontend
    git:
      remotes:
        origin: git@github.com:blueguardian-co/cerebralstratum-frontend.git
      checkoutFrom:
        revision: main
components:
  - attributes:
      che-code.eclipse.org/contribute-endpoint/che-code: 3100
      che-code.eclipse.org/contribute-endpoint/code-redirect-1: 13131
      che-code.eclipse.org/contribute-endpoint/code-redirect-2: 13132
      che-code.eclipse.org/contribute-endpoint/code-redirect-3: 13133
      che-code.eclipse.org/contribute-cpuLimit: true
      che-code.eclipse.org/contribute-cpuRequest: true
      che-code.eclipse.org/contribute-entry-point: true
      che-code.eclipse.org/contribute-memoryLimit: true
      che-code.eclipse.org/contribute-memoryRequest: true
      che-code.eclipse.org/contribute-volume-mount/checode: /checode
      che-code.eclipse.org/contributed-container: tools
      che-code.eclipse.org/original-memoryLimit: 1G
        - attributes:
            contributed-by: che-code.eclipse.org
            cookiesAuthEnabled: true
            discoverable: false
            type: main
            urlRewriteSupported: true
          exposure: public
          name: che-code
          path: '?tkn=eclipse-che'
          protocol: https
          secure: false
          targetPort: 3100
        - attributes:
            contributed-by: che-code.eclipse.org
            discoverable: false
            urlRewriteSupported: true
          exposure: public
          name: code-redirect-1
          protocol: http
          targetPort: 13131
        - attributes:
            contributed-by: che-code.eclipse.org
            discoverable: false
            urlRewriteSupported: true
          exposure: public
          name: code-redirect-2
          protocol: http
          targetPort: 13132
        - attributes:
            contributed-by: che-code.eclipse.org
            discoverable: false
            urlRewriteSupported: true
          exposure: public
          name: code-redirect-3
          protocol: http
          targetPort: 13133
    container:
      - command:
          - /checode/entrypoint-volume.sh
        cpuLimit: 500m
        cpuRequest: 30m
        env:
          - name: CHE_DASHBOARD_URL
            value: 'https://devspaces.apps.k8s.idm.hussdogg.com'
          - name: CHE_PLUGIN_REGISTRY_URL
            value: 'https://devspaces.apps.k8s.idm.hussdogg.com/plugin-registry/v3'
          - name: CHE_PLUGIN_REGISTRY_INTERNAL_URL
            value: 'http://plugin-registry.openshift-operators.svc:8080/v3'
          - name: OPENVSX_REGISTRY_URL
            value: 'https://open-vsx.org'
        image: 'registry.redhat.io/devspaces/udi-rhel8:latest'
        memoryLimit: 2.07G
        memoryRequest: 256Mi
        mountSources: true
        sourceMapping: /projects
        volumeMounts:
          - name: npm
            path: /home/user/.npm
          - name: checode
            path: /checode
      name: tools
    - command:
        - sleep
        - infinity
      env:
        - name: DEV_MODE
          value: 'true'
      endpoints:
        - exposure: public
          name: cswa
          protocol: http
          targetPort: 3000
      image: registry.redhat.com/rhel9/nodejs-16:latest
      mountSources: true
      sourceMapping: /projects
      name: nodejs
    - endpoints:
        - exposure: public
          name: csapi
          protocol: http
          targetPort: 6443
      image: quay.io/ahussey-redhat/cs-api:stable
      name: csapi
  - name: npm
    volume:
      size: 1G
commands:
  - exec:
      commandLine: npm install
      component: nodejs
      group:
        kind: build
      label: Download dependencies
      workingDir: '${PROJECTS_ROOT}/frontend'
    id: 1-dependencies
  - exec:
      commandLine: npm run dev
      component: nodejs
      group:
        kind: run
      label: Run the web app
      workingDir: '${PROJECTS_ROOT}/frontend'
    id: 2-run
  - exec:
      commandLine: npm install; npm run dev
      component: nodejs
      group:
        kind: run
      label: Run the web app (and download dependencies)
      workingDir: '${PROJECTS_ROOT}/frontend'
    id: 3-install-and-run
  - exec:
      commandLine: 'node_server_pids=$(pgrep -fx ''.*nodemon (--inspect )?app.js'' | tr "\\n" " ") && echo "Stopping node server with PIDs: ${node_server_pids}" &&  kill -15 ${node_server_pids} &>/dev/null && echo ''Done.'''
      component: nodejs
      group:
        kind: run
      label: Stop the web app
    id: 5-stopapp
